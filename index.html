<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DETRAN GO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="device">
    <div class="app-shell">
      <header class="app-header">
        <div class="app-brand">
          <div class="app-avatar"></div>
          <span>DETRAN GO</span>
        </div>
      <button class="icon-button" aria-label="Configurações">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8a4 4 0 1 0 4 4 4 4 0 0 0-4-4Zm8.9 3h-1.1a7.8 7.8 0 0 0-.6-1.5l.8-.8a1 1 0 0 0-1.4-1.4l-.8.8A7.8 7.8 0 0 0 13 6.2V5.1a1 1 0 0 0-2 0v1.1a7.8 7.8 0 0 0-1.5.6l-.8-.8a1 1 0 0 0-1.4 1.4l.8.8A7.8 7.8 0 0 0 6.2 11H5.1a1 1 0 0 0 0 2h1.1a7.8 7.8 0 0 0 .6 1.5l-.8.8a1 1 0 0 0 1.4 1.4l.8-.8A7.8 7.8 0 0 0 11 17.8v1.1a1 1 0 0 0 2 0v-1.1a7.8 7.8 0 0 0 1.5-.6l.8.8a1 1 0 0 0 1.4-1.4l-.8-.8a7.8 7.8 0 0 0 .6-1.5h1.1a1 1 0 0 0 0-2Z"/></svg>
      </button>
    </header>

    <main class="login-container">
      <section class="login-screen" id="login">
        <div class="login-brand">
          <div class="login-avatar"></div>
          <div>
            <p class="app-name">DETRAN GO</p>
            <p class="app-subtitle">Acesso seguro ao seu portal de mobilidade.</p>
          </div>
        </div>

        <div class="login-card">
          <p class="login-title">Entrar</p>
          <p class="login-text">Acesse sua conta para gerenciar sua CNH e seus veículos.</p>

          <label class="login-label">
            CPF
            <input class="login-input" type="text" placeholder="000.000.000-00" />
          </label>

          <label class="login-label">
            Senha
            <input class="login-input" type="password" placeholder="Digite sua senha" />
          </label>

          <a class="forgot" href="#">Esqueceu a senha?</a>
          <button class="primary-button login-button" type="button">Entrar</button>

          <div class="divider"><span>OU</span></div>

          <button class="social-button social-button--full" type="button">Gov.br</button>
          <button class="social-button social-button--secondary" type="button">Biometria</button>
        </div>

        <p class="login-footer">AMBIENTE SEGURO DETRAN GOIÁS</p>
      </section>
    </main>
  </div>
</div>
</body>
</html>
